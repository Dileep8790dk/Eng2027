<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eng2027</title>
<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script type="module" src="firebase-config.js"></script>
<script type="module" src="script.js"></script>
</head>
<body>

<div id="loginPage" class="center">
  <h2>Eng2027 Login</h2>
  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Password">
  <button onclick="register()">Register</button>
  <button onclick="login()">Login</button>
</div>

<div id="appPage" style="display:none">

<div id="dashboard" class="page active">
  <h2>Eng2027 Dashboard</h2>

  <div class="kpi-container">
    <div class="kpi blue">
      <h4>Current</h4>
      <p id="energyValue">0 kWh</p>
    </div>
    <div class="kpi green">
      <h4>Average</h4>
      <p id="avgValue">0 kWh</p>
    </div>
    <div class="kpi orange">
      <h4>Alerts</h4>
      <p id="alertCount">0</p>
    </div>
  </div>

  <div class="card"><canvas id="lineChart"></canvas></div>
  <div class="card"><canvas id="gaugeChart"></canvas></div>
</div>

<div id="reports" class="page">
  <h2>Reports</h2>
  <p id="reportData"></p>
  <button onclick="exportPDF()">Download PDF</button>
</div>

<div id="settings" class="page">
  <h2>Settings</h2>
  <input id="thresholdInput" placeholder="Alert Threshold">
  <button onclick="saveThreshold()">Save</button>
  <button onclick="toggleTheme()">Toggle Dark Mode</button>
  <button onclick="logout()">Logout</button>
</div>

<div class="bottom-nav">
  <button onclick="showPage('dashboard')">Dashboard</button>
  <button onclick="showPage('reports')">Reports</button>
  <button onclick="showPage('settings')">Settings</button>
</div>

</div>

</body>
</html>
